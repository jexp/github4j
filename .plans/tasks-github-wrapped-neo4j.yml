      and label distribution pie/bar chart. Each panel references a saved Cypher query against
      the imported graph.
    status: pending
    dependencies:
      - task-003
    acceptance_criteria:
      - "Dashboard JSON saved to dashboards/github-wrapped.json"
      - "JSON imports into Aura Dashboards without errors"
      - "All 5 panels render with real data from AuraDB"
      - "Cypher queries in panels are parameterised"
    completed_at: null

  - id: task-005
