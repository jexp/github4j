      in localStorage, and provides a helper function to POST parameterised Cypher queries
      to the AuraDB HTTP transaction API via fetch(). Include loading state UI and error
      handling for cold AuraDB starts.
    status: pending
    dependencies:
      - task-003
    acceptance_criteria:
      - "Config panel appears when localStorage credentials are absent"
      - "Credentials persisted to localStorage, not committed to repo"
      - "runQuery(cypher, params) helper returns parsed rows or throws with a user-visible error"
      - "Loading spinner shown while queries are in-flight"
      - "Page works when served from GitHub Pages HTTPS"
    completed_at: null

