tasks:
  - id: task-001
    title: "Define graph schema and create AuraDB indexes"
    description: |
      Document the property graph schema for all node labels (Person, Repo, PullRequest,
      File, Directory, Label) and relationship types with their properties. Write and run
      Cypher statements to create uniqueness constraints and indexes on Person.login,
      Repo.repoId, PullRequest.prId, and File.fileId against the AuraDB instance.
    status: completed
    dependencies: []
    acceptance_criteria:
      - "All 6 node labels defined with correct properties matching CSV columns"
      - "All 7 relationship types defined with correct directionality and properties"
      - "Indexes created and verified via SHOW INDEXES in AuraDB"
      - "Schema documented in import/schema.cypher"
    completed_at: "2026-03-25T10:00:00Z"

  - id: task-002
    title: "Write LOAD CSV import scripts for all 6 CSVs"
    description: |
      Write Cypher LOAD CSV scripts to import data in dependency order: persons → repos →
      files → prs → reviews → files_touched. Each script uses MERGE to avoid duplicates,
      sets all properties from CSV columns, and creates the correct relationships. Validate
      row counts against AuraDB Free tier limits (≤200k nodes, ≤400k rels) before running.
    status: completed
    dependencies:
      - task-001
    acceptance_criteria:
      - "All 6 import scripts in import/ directory, named 01_persons.cypher through 06_files_touched.cypher"
      - "Each script uses MERGE not CREATE to be idempotent"
      - "Labels from prs.csv semicolon-separated field split into individual Label nodes with HAS_LABEL relationships"
      - "Node and relationship counts printed after import match expected CSV row counts"
      - "Total node + relationship count within AuraDB Free tier limits"
    completed_at: "2026-03-25T13:00:00Z"

  - id: task-003
    title: "Verify import with sanity-check Cypher queries"
    description: |
      Write a set of verification Cypher queries to confirm data integrity after import.
      Checks include: node counts per label, relationship counts per type, sample path
      traversals (e.g. person→PR→file), and the hero stat queries (Great Deleter, Bug Slayer)
      returning non-empty results.
    status: pending
    dependencies:
      - task-002
    acceptance_criteria:
      - "Verification queries in import/verify.cypher"
      - "Great Deleter query returns at least 5 results with non-zero deletions"
      - "Bug Slayer query returns results (bug-labelled merged PRs exist in data)"
      - "Collaboration pairs query (AUTHORED + REVIEWED same PR) returns results"
    completed_at: null

