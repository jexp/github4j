  - id: task-011
    title: "Build GDS notebook: graph projection and Louvain community detection"
    description: |
      Create notebooks/github_gds.ipynb and set up the project with uv (pyproject.toml).
      Connect to AuraDB using neo4j-rust-ext and the graphdatascience client. Project a
      person-to-person collaboration graph (persons who co-appear on the same PR as
      author+reviewer). Run Louvain community detection and write community IDs back to
      Person nodes in AuraDB.
    status: pending
    dependencies:
      - task-003
    acceptance_criteria:
      - "pyproject.toml present with uv-managed deps: neo4j-rust-ext, graphdatascience, neo4j-viz[notebook], jupyter"
      - "Notebook connects to AuraDB via environment variable credentials (not hardcoded)"
      - "GDS graph projection created from AUTHORED + REVIEWED relationships"
      - "Louvain runs and produces community IDs"
      - "Community IDs written back to Person.community property in AuraDB"
      - "Cell outputs show community count and size distribution"
    completed_at: null

